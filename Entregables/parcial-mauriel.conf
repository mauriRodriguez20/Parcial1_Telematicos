<VirtualHost *:80>
    ServerName parcial.mauriel.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/parcial_error.log
    CustomLog ${APACHE_LOG_DIR}/parcial_access.log combined
</VirtualHost>