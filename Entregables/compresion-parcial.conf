<IfModule mod_deflate.c>
    # Comprimir contenido de texto
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
    AddOutputFilterByType DEFLATE application/javascript application/x-javascript application/json
    AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
    AddOutputFilterByType DEFLATE font/ttf font/otf image/svg+xml

    # Excluir archivos ya comprimidos (imagenes/videos y similares)
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|ico|mp4|m4v|mov|avi|mp3|wav|ogg|zip|gz|rar|7z|pdf)$ no-gzip dont-vary

    # Buenas prácticas para caches/proxys
    Header append Vary Accept-Encoding
</IfModule>